name: Deploy Dist
on: [push, workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4
        # run: |
        #     echo "getting test code..."
        #     echo "cloning repo..."
        #     echo "${{toJson(github)}}"
        #     git clone https://github.com/${{github.repository}}.git
      - name: install node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4 
      - name: install node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: install dependencies
        run: npm ci
      - name: Build project
        run: npm run build
      - name: deploy
        run: echo "Deploy successfully"  
