name: Deploy Dist 
on: 
  push:
    branches: 
      - main
      - 'feature/**'
    paths-ignore: 
      - '/github/workflows/*' 
      - README.md  
  workflow_dispatch:
            
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4
      - name: install node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Cache Dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
      - name: install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v4
      - name: install node 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Cache Dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
      - name: install dependencies
        run: npm ci
      - name: Build project
        run: npm run build
      - name: deploy
        run: echo "Deploy successfully"
